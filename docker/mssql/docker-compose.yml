version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_h3
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=H3password!
    ports:
      - "1433:1433"

  mssql-setup:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_h3_setup
    depends_on:
      - mssql
    volumes:
      - ./setup.sql:/setup.sql
    command: >
      bash -c "
      echo 'Waiting for SQL Server to start...';
      sleep 20;
      /opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P 'H3password!' -C -i /setup.sql;
      echo 'MSSQL Setup Complete. You can now use h3expert/H3password! for h3dbtest.';
      "
