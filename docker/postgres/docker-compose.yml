version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: postgres_h3
    restart: always
    environment:
      - POSTGRES_DB=h3dbtest
      - POSTGRES_USER=h3expert
      - POSTGRES_PASSWORD=H3password!
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h3expert -d h3dbtest"]
      interval: 5s
      timeout: 5s
      retries: 5
